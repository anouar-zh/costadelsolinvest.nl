<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="ogSunGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8762D"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#222222"/>
    </linearGradient>
    <!-- Clip for logo area -->
    <clipPath id="logoClip">
      <rect x="60" y="115" width="340" height="400"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle top border accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#E8762D"/>

  <!-- Bottom decorative wave -->
  <path d="M0 580 Q150 555, 300 580 Q450 605, 600 580 Q750 555, 900 580 Q1050 605, 1200 580 L1200 630 L0 630 Z"
        fill="#E8762D" opacity="0.08"/>
  <path d="M0 600 Q150 580, 300 600 Q450 620, 600 600 Q750 580, 900 600 Q1050 620, 1200 600 L1200 630 L0 630 Z"
        fill="#E8762D" opacity="0.05"/>

  <!-- === LOGO (left side) === -->
  <g transform="translate(100, 80) scale(0.85)">
    <!-- Semi-circle sun -->
    <path d="M100 360 A156 156 0 0 1 412 360 Z" fill="url(#ogSunGrad)"/>

    <!-- Tall building -->
    <rect x="168" y="170" width="80" height="230" rx="6" fill="white"/>
    <rect x="168" y="170" width="80" height="12" rx="6" fill="#C45E22"/>
    <!-- Windows col 1 -->
    <rect x="183" y="200" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="183" y="240" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="183" y="280" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="183" y="320" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <!-- Windows col 2 -->
    <rect x="215" y="200" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="215" y="240" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="215" y="280" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="215" y="320" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>

    <!-- Shorter building -->
    <rect x="264" y="250" width="80" height="150" rx="6" fill="white"/>
    <rect x="264" y="250" width="80" height="12" rx="6" fill="#C45E22"/>
    <rect x="279" y="278" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="311" y="278" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="279" y="318" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="311" y="318" width="20" height="24" rx="3" fill="#E8762D" opacity="0.3"/>
    <rect x="294" y="362" width="24" height="38" rx="12" fill="#E8762D" opacity="0.35"/>

    <!-- Wave -->
    <path d="M60 420 Q150 395, 256 420 Q362 445, 452 420"
          stroke="white" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Divider line -->
  <line x1="520" y1="140" x2="520" y2="490" stroke="#E8762D" stroke-width="2" opacity="0.3"/>

  <!-- === TEXT (right side) === -->

  <!-- Main title -->
  <text x="570" y="255" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="white" letter-spacing="-1">
    Costa del Sol
  </text>
  <text x="570" y="325" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#E8762D" letter-spacing="-1">
    Invest
  </text>

  <!-- Horizontal rule -->
  <rect x="570" y="355" width="80" height="3" rx="1.5" fill="#E8762D" opacity="0.6"/>

  <!-- Tagline -->
  <text x="570" y="400" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#AAAAAA" font-weight="300" letter-spacing="0.5">
    Uw volgende investering
  </text>
  <text x="570" y="435" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="24" fill="#AAAAAA" font-weight="300" letter-spacing="0.5">
    begint hier
  </text>

  <!-- Domain -->
  <text x="570" y="500" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#666666" font-weight="400" letter-spacing="2">
    costadelsolinvest.nl
  </text>
</svg>
